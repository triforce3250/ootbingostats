<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OoT Bingo Stats Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="dashboard-main-title">📜 OoT Bingo Stats</h1>
            <p>Historical performance tracking for Ocarina of Time Bingo.</p>
        </header>

        <section class="dashboard-controls">
            <div class="search-row">
                <div class="control-group">
                    <label>Primary Racer</label>
                    <input type="text" id="userSearch" list="playerList" placeholder="Select Racer..." onclick="this.value=''"
                        onfocus="this.value=''" oninput="handleSearch()">
                </div>

            <div class="control-group">
                <label>Optional Comparison</label>
                <input type="text" id="compareSearch" list="playerList" placeholder="Add Rival..." onclick="this.value=''"
                    onfocus="this.value=''" oninput="handleCompare()">
                </div>
                </div>

            <div class="filter-row">
                <div class="control-group">
                    <label>Bingo Version:</label>
                    <select id="versionFilter" onchange="applyFilters()">
                        <option value="all">All Versions</option>
                    </select>
                    </div>
                <button id="resetZoomBtn" onclick="resetChartZoom()" style="display:none;">Reset Zoom</button>
            </div>
        </section>

        <datalist id="playerList"></datalist>

        <body>
            <div id="stats-summary">
                <h2 id="display-name">Select a player</h2>
                <p id="race-count"></p>
            </div>
            
            <div class="chart-container" style="position: relative; height:70vh; width:90vw; margin: auto;">
                <canvas id="statsChart"></canvas>
            </div>
        </body>

        <footer>
            <p id="updateTimestamp">Data automatically updates daily to reflect recorded Racetime races.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
