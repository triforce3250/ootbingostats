<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OoT Bingo Stats Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📜 OoT Bingo Stats</h1>
            <p>Historical performance tracking for Ocarina of Time Bingo.</p>
        </header>
        
        <section class="search-section">
            <div class="search-box">
                <input type="text" id="userSearch" list="playerList" placeholder="Search a racer..." />
                <datalist id="playerList">
                    </datalist>
                <button onclick="searchUser()">View Stats</button>
            </div>
            
            <div class="quick-select">
                <span>Featured Players:</span>
                <button onclick="quickSearch('tob3000')">tob3000</button>
                <button onclick="quickSearch('triforce3250')">triforce3250</button>
                <button onclick="quickSearch('2dollargargoyle')">2DollarGargoyle</button>
            </div>
        </section>

        <hr>

        <main id="dashboard" style="display: none;">
            <div id="statsSummary" class="stats-grid">
                </div>

            <div class="chart-container">
                <canvas id="statsChart"></canvas>
            </div>
        </main>

        <div id="loadingMessage">Select a racer to view dashboard.</div>

        <footer>
            <p id="updateTimestamp">Data automatically updates daily via GitHub Actions.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
