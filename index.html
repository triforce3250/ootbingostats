<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OoT Bingo Stats Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📜 OoT Bingo Stats</h1>
            <p>Historical performance tracking for Ocarina of Time Bingo.</p>
        </header>
        
        <section class="search-section">
            <div class="search-box">
                <input type="text" id="userSearch" list="playerList" placeholder="Search a racer..." onfocus="this.value=''"
                    oninput="handleSearch()" />
                <datalist id="playerList">
                    </datalist>
                <button onclick="searchUser()">View Stats</button>
            </div>
            
            <div class="quick-select">
                <span>Featured Players:</span>
                <button onclick="quickSearch('tob3000')">tob3000</button>
                <button onclick="quickSearch('triforce3250')">triforce3250</button>
                <button onclick="quickSearch('2dollargargoyle')">2DollarGargoyle</button>
            </div>
        </section>

        <hr>

        <div class="dashboard-controls">
            <div class="control-group">
                <label>Primary Racer:</label>
                <input type="text" id="userSearch" list="playerList" oninput="handleSearch()" onfocus="this.value=''"
                    placeholder="Select Player...">
            </div>
        
            <div class="control-group">
                <label>Compare With:</label>
                <input type="text" id="compareSearch" list="playerList" oninput="handleCompare()" onfocus="this.value=''"
                    placeholder="Optional Rival...">
            </div>
        
            <div class="control-group">
                <label>Filter by Version:</label>
                <select id="versionFilter" onchange="applyFilters()">
                    <option value="all">All Versions</option>
                </select>
            </div>

            <div class="control-group">
                <button id="resetZoomBtn" onclick="resetChartZoom()" style="display:none;">Reset Zoom</button>
            </div>
        </div>
        
        <datalist id="playerList"></datalist>
        
        <div id="stats-summary">
            <h2 id="display-name">Select a player</h2>
            <p id="race-count"></p>
        </div>
        
        <div class="chart-container" style="position: relative; height:70vh; width:90vw; margin: auto;">
            <canvas id="statsChart"></canvas>
        </div>

        <div id="loadingMessage">Select a racer to view dashboard.</div>

        <footer>
            <p id="updateTimestamp">Data automatically updates daily via GitHub Actions.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
