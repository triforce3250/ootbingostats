<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OoT Bingo Stats</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body>
    <div class="container">
        <h1>OoT Bingo Stats</h1>
        <p>Enter a Racetime.gg username to view their Ocarina of Time Bingo history.</p>
        
        <div class="search-box">
            <input type="text" id="usernameInput" placeholder="e.g., Zfg" />
            <button id="searchBtn">Get Stats</button>
        </div>

        <div id="statusMessage"></div>

        <div class="chart-container">
            <canvas id="bingoChart"></canvas>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
